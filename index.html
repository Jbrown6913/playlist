<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listening Session</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0d0b;
      --surface: #181613;
      --border: #2a2520;
      --text: #ede8de;
      --muted: #7a7368;
      --accent: #c4603a;
      --accent-dim: rgba(196, 96, 58, 0.15);
      --track-h: 2px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    header {
      width: 100%;
      max-width: 640px;
      margin-bottom: 52px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 28px;
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(36px, 6vw, 56px);
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 10px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    /* Track list */
    .tracklist {
      width: 100%;
      max-width: 640px;
    }

    .track {
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
      border-radius: 2px;
    }

    .track:hover { background: rgba(255,255,255,0.02); }

    .track.active {
      background: var(--accent-dim);
    }

    .track.active .track-num { color: var(--accent); }
    .track.active .track-title { color: var(--text); }

    .track-num {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      font-family: 'Space Mono', monospace;
      transition: color 0.2s;
      user-select: none;
    }

    .track-num .play-icon { display: none; }
    .track.active .track-num .num-text { display: none; }
    .track.active .track-num .play-icon { display: inline; color: var(--accent); }

    .track-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: #b8b3a8;
      letter-spacing: 0.01em;
      transition: color 0.2s;
      line-height: 1.2;
    }

    .track-dur {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      white-space: nowrap;
    }

    /* Player bar */
    .player-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #131210;
      border-top: 1px solid var(--border);
      padding: 14px 24px 18px;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .player-inner {
      max-width: 640px;
      margin: 0 auto;
    }

    .player-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .now-playing-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .now-playing-title.idle {
      color: var(--muted);
      font-style: italic;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    button.ctrl {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
    }

    button.ctrl:hover { color: var(--text); }

    button.ctrl.play-pause {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      justify-content: center;
    }

    button.ctrl.play-pause:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      width: 36px;
      flex-shrink: 0;
    }

    .time.end { text-align: right; }

    .progress-wrap {
      flex: 1;
      height: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .progress-track {
      width: 100%;
      height: var(--track-h);
      background: var(--border);
      border-radius: 1px;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 0%;
      transition: width 0.2s linear;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      left: 0%;
      opacity: 0;
      transition: opacity 0.2s, left 0.2s linear;
    }

    .progress-wrap:hover .progress-thumb { opacity: 1; }

    audio { display: none; }

    .script-link {
      display: inline-block;
      margin-top: 16px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }
    .script-link:hover { opacity: 0.7; }
  </style>
</head>
<body>

<div class="shell">
  <header>
    <p class="label">Private Listening Session</p>
    <h1>New <em>Songs</em></h1>
    <p class="subtitle">7 tracks &nbsp;·&nbsp; For your ears only</p>
    <a class="script-link" href="EverySingleNight__1_.pdf" target="_blank">Read the Script &rarr;</a>
  </header>

  <div class="tracklist" id="tracklist"></div>
</div>

<div class="player-bar">
  <div class="player-inner">
    <div class="player-top">
      <div class="now-playing-title idle" id="nowPlaying">Select a track</div>
      <div class="controls">
        <button class="ctrl" id="btnPrev" title="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl play-pause" id="btnPlay" title="Play / Pause">
          <svg id="iconPlay" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl" id="btnNext" title="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.25 3.64L8 17.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>
    </div>
    <div class="progress-row">
      <span class="time" id="timeCur">0:00</span>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
      </div>
      <span class="time end" id="timeDur">0:00</span>
    </div>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
  const tracks = [
    { file: '01%20Like%20a%20Ghost%20Jay%20mix%201.mp3', title: 'Like a Ghost' },
    { file: '51_50.m4a',                      title: '51/50' },
    { file: 'Cecelia.mp3',                    title: 'Cecelia' },
    { file: 'LANDR-End%20Of%20The%20Road%20Mix.mp3',  title: 'End of the Road' },
    { file: 'Laundromat.mp3',                 title: 'Laundromat' },
    { file: 'Let_It_Burn.m4a', title: 'Let It Burn' },
    { file: 'No%20one%20is%20coming%20to%20save%20me.m4a', title: 'No One Is Coming to Save Me' },
  ];

  let current = -1;
  let playing = false;

  const audio = document.getElementById('audioEl');
  const tracklist = document.getElementById('tracklist');
  const nowPlaying = document.getElementById('nowPlaying');
  const btnPlay = document.getElementById('btnPlay');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const progressFill = document.getElementById('progressFill');
  const progressThumb = document.getElementById('progressThumb');
  const progressWrap = document.getElementById('progressWrap');
  const timeCur = document.getElementById('timeCur');
  const timeDur = document.getElementById('timeDur');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');

  function fmt(s) {
    if (isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  // Render track list
  tracks.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'track';
    div.dataset.index = i;
    div.innerHTML = `
      <div class="track-num">
        <span class="num-text">${String(i + 1).padStart(2, '0')}</span>
        <span class="play-icon">&#9654;</span>
      </div>
      <div class="track-title">${t.title}</div>
      <div class="track-dur" id="dur-${i}">—</div>
    `;
    div.addEventListener('click', () => loadTrack(i, true));
    tracklist.appendChild(div);

    // Pre-load duration
    const tmp = new Audio();
    tmp.src = t.file;
    tmp.addEventListener('loadedmetadata', () => {
      document.getElementById(`dur-${i}`).textContent = fmt(tmp.duration);
    });
  });

  function setPlayState(isPlaying) {
    playing = isPlaying;
    iconPlay.style.display = isPlaying ? 'none' : 'inline';
    iconPause.style.display = isPlaying ? 'inline' : 'none';
  }

  function loadTrack(idx, autoplay = false) {
    // Deactivate previous
    if (current >= 0) {
      document.querySelector(`.track[data-index="${current}"]`).classList.remove('active');
    }
    current = idx;
    const t = tracks[idx];
    audio.src = t.file;
    document.querySelector(`.track[data-index="${idx}"]`).classList.add('active');
    nowPlaying.textContent = t.title;
    nowPlaying.classList.remove('idle');
    timeCur.textContent = '0:00';
    timeDur.textContent = '—';
    progressFill.style.width = '0%';
    progressThumb.style.left = '0%';

    if (autoplay) {
      audio.play();
      setPlayState(true);
    }
  }

  btnPlay.addEventListener('click', () => {
    if (current === -1) { loadTrack(0, true); return; }
    if (playing) { audio.pause(); setPlayState(false); }
    else { audio.play(); setPlayState(true); }
  });

  btnPrev.addEventListener('click', () => {
    if (current <= 0) return;
    loadTrack(current - 1, playing);
  });

  btnNext.addEventListener('click', () => {
    if (current >= tracks.length - 1) return;
    loadTrack(current + 1, playing);
  });

  audio.addEventListener('loadedmetadata', () => {
    timeDur.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    progressThumb.style.left = pct + '%';
    timeCur.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    if (current < tracks.length - 1) {
      loadTrack(current + 1, true);
    } else {
      setPlayState(false);
    }
  });

  progressWrap.addEventListener('click', (e) => {
    if (!audio.duration) return;
    const rect = progressWrap.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });
</script>
</body>
</html>
